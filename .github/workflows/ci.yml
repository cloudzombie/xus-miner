name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Prove application/version contract
        run: python3 scripts/check_version.py

  chaincode-boundary:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Prove repository isolation
        run: python3 scripts/check_chaincode_boundary.py

  supply-chain:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install pinned RustSec scanner
        run: cargo install cargo-audit --locked --version 0.22.2
      - name: Reject advisories and yanked crates
        run: cargo audit --deny warnings

  native-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, macos-15-intel, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Rust checks
        run: rustup component add rustfmt clippy
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Test engine and GUI
        run: cargo test --locked --bin xus-miner
      - name: Test external mining protocol
        run: cargo test --locked --test miner_protocol
      - name: Test SOV 0.1.99 direct RPC contract
        run: cargo test --locked --test rpc_0199_protocol
      - name: Validate fast RandomX mining vector (shared full dataset)
        timeout-minutes: 12
        run: cargo test --locked --release --bin xus-miner randomx_mainnet_job_uses_the_exact_sov_mining_seal -- --ignored --test-threads=1
      - name: Soak two-worker direct RPC RandomX engine (Windows)
        if: matrix.os == 'windows-2025'
        timeout-minutes: 12
        run: cargo test --locked --release --test rpc_0199_protocol headless_randomx_direct_rpc_engine_stays_alive_for_short_window -- --ignored --test-threads=1
      - name: Build release
        run: cargo build --locked --release
